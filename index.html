function nextQ() {
  if (selected === null) return;

    render();
  } else {

  }

    var matchedBreed = null;
    var breedKeys = Object.keys(BREEDS);
    for (var b = 0; b < breedKeys.length; b++) {
      if (result.breed && result.breed.toLowerCase().indexOf(breedKeys[b].toLowerCase()) !== -1) {
        matchedBreed = breedKeys[b];
        break;

    if (!matchedBreed) matchedBreed = breedKeys[Math.floor(Math.random() * breedKeys.length)];

  .then(function(data) {
    if (data.image) {
      var imgEl = document.getElementById("resultImg");
      var genEl = document.getElementById("imgGenerating");
      if (imgEl) {
        imgEl.src = "data:image/png;base64," + data.image;
        imgEl.style.display = "block";
      }
      if (genEl) genEl.style.display = "none";
    }
  })
  .catch(function(err) {
    var genEl = document.getElementById("imgGenerating");
    if (genEl) {
      genEl.innerHTML = '<span>' + (BREEDS[breedName] ? BREEDS[breedName].emoji : "&#x1F413;") + '</span><p>Image unavailable</p>';
    }
  });
}

function showResult(r, imgB64) {
  var breedData = BREEDS[r.breed] || { emoji: "&#x1F413;", tagline: "", imagePrompt: "" };
  var traits = "";
  if (r.traits) {
    for (var i = 0; i < r.traits.length; i++) {
      traits += '<span class="trait-pill">' + r.traits[i] + '</span>';
    }
  }
  var shareText = "I matched with the " + r.breed + "! " + r.headline + " Find your chicken vibe at chickens.rlbdesigns.com";

  document.getElementById("app").innerHTML =
    '<div class="result-wrap">' +
      '<div class="progress-wrap"><div class="progress-fill" style="width:100%"></div></div>' +
      '<div class="progress-label" style="color:var(--feather)">&#x2705; Your vibe has been clucked!</div>' +
      '<div class="result-card">' +
        '<div class="result-img-wrap">' +
          '<img id="resultImg" src="" alt="' + r.breed + '" style="display:none"/>' +
          '<div id="imgGenerating" class="img-generating">' +
            '<span>&#x1F3A8;</span>' +
            '<p>Painting your chicken portrait...</p>' +
          '</div>' +
        '</div>' +
        '<div class="result-body">' +
          '<div class="result-match-label">Your chicken vibe match is...</div>' +
          '<div class="result-breed">' + r.breed + ' ' + breedData.emoji + '</div>' +
          '<div class="result-tagline">' + breedData.tagline + '</div>' +
          '<p class="result-reading">' + r.reading + '</p>' +
          '<div class="result-traits">' + traits + '</div>' +
          '<div class="coloring-box">' +
            '<h4>&#x1F58D; Free Coloring Page!</h4>' +
            '<p>Download your free <strong>' + r.breed + '</strong> coloring page — print it, color it, and show off your chicken vibe! Click below to get yours.</p>' +
            '<button class="btn-coloring" onclick="downloadColoring(\'' + r.breed.replace(/'/g, "\\'") + '\')">&#x2B07; Get My Free Coloring Page</button>' +
          '</div>' +
          '<div class="share-row">' +
            '<button class="btn-share" id="copyBtn">&#x1F4CB; Copy Result</button>' +
            '<button class="btn-share" id="shareBtn">&#x1F517; Share</button>' +
          '</div>' +
          '<button class="btn-retry" onclick="restart()">&#x1F504; Take the Quiz Again</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById("copyBtn").onclick = function() {
    navigator.clipboard.writeText(shareText)
      .then(function() { alert("Copied! Share your chicken vibe!"); })
      .catch(function() { alert("Couldn't copy — try manually."); });
  };
  document.getElementById("shareBtn").onclick = function() {
    if (navigator.share) {
      navigator.share({ text: shareText, url: "https://chickens.rlbdesigns.com" });
    } else {
      window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(shareText), "_blank");
    }
  };
}

function downloadColoring(breedName) {
  var prompt = COLORING_PROMPTS[breedName];
  if (!prompt) { alert("Coloring page coming soon for " + breedName + "!"); return; }
  var msg = "To get your FREE " + breedName + " coloring page:\n\n" +
    "1. Go to aistudio.google.com\n" +
    "2. Click 'Create' then choose ImageFX or Imagen\n" +
    "3. Paste this prompt:\n\n" + prompt + "\n\n" +
    "4. Download and print your coloring page!";
  alert(msg);
}

function showError(msg) {
  document.getElementById("app").innerHTML =
    '<div class="error-msg">The hens got confused! ' + msg + '</div>' +
    '<button class="btn-retry" style="margin-top:1rem;display:block;width:100%;padding:0.85rem;background:var(--feather);color:#fff;font-family:Fredoka One,cursive;font-size:1.1rem;border:none;border-radius:14px;cursor:pointer" onclick="restart()">&#x1F504; Start Over</button>';
}

function restart() {
  current = 0; selected = null; answers = [];
  render();
}

render();
</script>
</body>
</html>
